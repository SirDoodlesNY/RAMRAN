<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMRAN · Station Log</title>
<meta name="description" content="Sign the RAMRAN station logbook — leave your callsign and a 73.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --case:#0d1316; --case-deep:#090d0f; --panel:#141d21; --panel-line:#25343a;
    --field:#0f171a; --ink:#e9e6dc; --ink-dim:#7c8f94; --ink-faint:#4a5a5f;
    --amber:#ffb02e; --amber-soft:#c9821f; --green:#3ddc84;
  }
  *{ box-sizing:border-box; }
  [hidden]{ display:none !important; }
  html,body{ margin:0; min-height:100%; }
  body{
    background:radial-gradient(120% 90% at 50% 0%, #16211f 0%, var(--case) 45%, var(--case-deep) 100%);
    color:var(--ink); font-family:"JetBrains Mono", ui-monospace, monospace;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center;
    padding:24px 16px; min-height:100vh;
  }
  .card{
    width:100%; max-width:620px; align-self:flex-start;
    background:linear-gradient(180deg, #162025 0%, var(--panel) 60%);
    border:1px solid var(--panel-line); border-radius:14px;
    padding:clamp(24px, 5vw, 44px); position:relative; overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 30px 80px -40px #000;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  .card::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 4px);
    pointer-events:none;
  }
  .card > *{ position:relative; z-index:1; }

  .back{ display:inline-flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink); text-decoration:none; border:1px solid var(--panel-line); border-radius:7px; padding:9px 16px; transition:border-color .18s, color .18s, box-shadow .18s; }
  .back:hover,.back:focus-visible{ border-color:var(--amber); color:var(--amber); box-shadow:0 0 22px -8px rgba(255,176,46,.6); outline:none; }
  .back:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

  .status{ display:inline-flex; align-items:center; gap:9px; margin-top:26px; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--green); }
  .beacon{ width:8px; height:8px; border-radius:50%; background:var(--green); animation:ping 2.4s ease-out infinite; }
  .logtitle{ font-family:"Saira Condensed", sans-serif; font-weight:700; font-size:clamp(40px, 12vw, 78px); line-height:.9; letter-spacing:.05em; margin:14px 0 0; text-shadow:0 0 26px rgba(255,176,46,.14); }
  .lede{ margin:16px 0 0; font-size:13px; line-height:1.6; color:var(--ink-dim); }
  .lede b{ color:var(--ink); font-weight:500; }

  form{ margin-top:30px; display:flex; flex-direction:column; gap:12px; }
  label{ display:block; font-size:9.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px; }
  input,textarea{ width:100%; background:var(--field); color:var(--ink); border:1px solid var(--panel-line); border-radius:7px; font-family:inherit; font-size:14px; padding:11px 12px; resize:vertical; transition:border-color .18s, box-shadow .18s; }
  input:focus,textarea:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); }
  textarea{ min-height:46px; }
  .hp{ position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden; }

  .send{ align-self:flex-start; background:transparent; color:var(--ink); cursor:pointer; border:1px solid var(--panel-line); border-radius:7px; font-family:inherit; font-size:12px; letter-spacing:.14em; text-transform:uppercase; padding:12px 22px; transition:border-color .18s, color .18s, box-shadow .18s; }
  .send:hover,.send:focus-visible{ border-color:var(--amber); color:var(--amber); box-shadow:0 0 22px -8px rgba(255,176,46,.6); outline:none; }
  .send:disabled{ opacity:.5; cursor:default; box-shadow:none; border-color:var(--panel-line); color:var(--ink-dim); }
  .note{ font-size:11px; letter-spacing:.04em; color:var(--ink-faint); min-height:14px; margin-top:2px; }
  .note.err{ color:#e8895f; }
  .note.ok{ color:var(--amber-soft); }

  .entries{ margin-top:34px; border-top:1px solid var(--panel-line); }
  .entry{ padding:16px 2px; border-bottom:1px solid var(--panel-line); }
  .entry .head{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:6px; }
  .entry .who{ font-size:13px; font-weight:500; color:var(--amber); letter-spacing:.04em; }
  .entry .meta{ display:flex; align-items:center; gap:10px; }
  .entry .when{ font-size:10.5px; letter-spacing:.12em; color:var(--ink-faint); white-space:nowrap; }
  .entry .msg{ font-size:13.5px; line-height:1.55; color:var(--ink); white-space:pre-wrap; word-break:break-word; }
  .empty{ padding:26px 2px; color:var(--ink-dim); font-size:13px; }
  .del{ background:none; border:1px solid var(--panel-line); color:var(--ink-faint); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; line-height:1; padding:3px 8px; transition:border-color .18s,color .18s; }
  .del:hover{ border-color:#e8895f; color:#e8895f; }

  /* admin */
  .adminpanel{ margin-top:26px; padding:16px; border:1px solid var(--panel-line); border-radius:8px; background:rgba(255,255,255,0.02); }
  .adminrow{ display:flex; gap:10px; margin-top:8px; align-items:center; flex-wrap:wrap; }
  .adminrow input{ flex:1 1 180px; }
  .adminon{ color:var(--amber); font-size:11px; letter-spacing:.18em; text-transform:uppercase; }
  .adminlink{ color:var(--ink-faint); text-decoration:none; }
  .adminlink:hover{ color:var(--amber); }

  .foot{ margin-top:30px; padding-top:18px; border-top:1px solid var(--panel-line); display:flex; justify-content:space-between; align-items:baseline; gap:12px; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); }
  .foot .sign{ color:var(--amber-soft); }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @keyframes ping{ 0%{ box-shadow:0 0 0 0 rgba(61,220,132,.5); } 70%{ box-shadow:0 0 0 9px rgba(61,220,132,0); } 100%{ box-shadow:0 0 0 0 rgba(61,220,132,0); } }
  @media (prefers-reduced-motion: reduce){ .card{ animation:none; } .beacon{ animation:none; } }
</style>
</head>
<body>
  <main class="card">

    <a class="back" href="index.html">&larr; Back</a>

    <div class="status"><span class="beacon"></span>Logbook open</div>
    <h1 class="logtitle">Station log</h1>
    <p class="lede">Passing through the mesh? <b>Sign the log.</b> Leave your callsign, node, or just a <b>73</b> — no account needed.</p>

    <form id="gb-form" autocomplete="off">
      <div>
        <label for="gb-name">Callsign / name</label>
        <input id="gb-name" name="name" maxlength="40" required placeholder="e.g. R29D">
      </div>
      <div>
        <label for="gb-msg">Message</label>
        <textarea id="gb-msg" name="message" maxlength="280" required placeholder="Hello from..."></textarea>
      </div>
      <div class="hp" aria-hidden="true">
        <label>Website<input id="gb-website" name="website" tabindex="-1" autocomplete="off"></label>
      </div>
      <button class="send" id="gb-send" type="submit">Sign the log</button>
      <div class="note" id="gb-note"></div>
    </form>

    <section class="entries" id="gb-entries"></section>

    <div class="adminpanel" id="adminpanel" hidden>
      <div id="admin-login">
        <label for="admin-pass">Admin login</label>
        <div class="adminrow">
          <input id="admin-pass" type="password" placeholder="password" autocomplete="current-password">
          <button class="send" id="admin-login-btn" type="button">Log in</button>
        </div>
        <div class="note" id="admin-note"></div>
      </div>
      <div id="admin-loggedin" class="adminrow" hidden>
        <span class="adminon">&#9673; Admin mode — delete buttons active</span>
        <button class="send" id="admin-logout-btn" type="button">Log out</button>
      </div>
    </div>

    <footer class="foot">
      <span class="sign">73's &middot; de RAMRAN</span>
      <span><a href="#" id="admin-toggle" class="adminlink">admin</a> &middot; ramran.net</span>
    </footer>

  </main>

<script>
  const API = "https://ramran-guestbook.rocareameshradioantennanetwork.workers.dev";

  const $ = id => document.getElementById(id);
  const form=$("gb-form"), note=$("gb-note"), sendBtn=$("gb-send"), list=$("gb-entries");
  const panel=$("adminpanel"), loginBox=$("admin-login"), loggedBox=$("admin-loggedin"),
        passInput=$("admin-pass"), adminNote=$("admin-note");

  const KEY = "gb_admin_token";
  function lsGet(k){ try{return localStorage.getItem(k);}catch{return null;} }
  function lsSet(k,v){ try{localStorage.setItem(k,v);}catch{} }
  function lsDel(k){ try{localStorage.removeItem(k);}catch{} }

  let token = lsGet(KEY);
  let adminMode = !!token;

  function fmt(ts){ try{ return new Date(ts).toISOString().slice(0,16).replace("T"," ")+" UTC"; }catch{ return ""; } }

  function render(entries){
    list.textContent = "";
    if(!entries.length){
      const e=document.createElement("div"); e.className="empty"; e.textContent="No one's signed yet — be the first.";
      list.appendChild(e); return;
    }
    for(const it of entries){
      const wrap=document.createElement("div"); wrap.className="entry";
      const head=document.createElement("div"); head.className="head";
      const who=document.createElement("span"); who.className="who"; who.textContent=it.name;
      const meta=document.createElement("span"); meta.className="meta";
      const when=document.createElement("span"); when.className="when"; when.textContent=fmt(it.ts);
      meta.appendChild(when);
      if(adminMode){
        const del=document.createElement("button"); del.className="del"; del.type="button";
        del.textContent="\u2715"; del.title="Delete entry";
        del.addEventListener("click", ()=>removeEntry(it));
        meta.appendChild(del);
      }
      head.append(who, meta);
      const msg=document.createElement("div"); msg.className="msg"; msg.textContent=it.message;
      wrap.append(head, msg);
      list.appendChild(wrap);
    }
  }

  async function load(){
    try{ const r=await fetch(API); render(await r.json()); }
    catch{ list.innerHTML='<div class="empty">Log unavailable right now. Try again shortly.</div>'; }
  }

  form.addEventListener("submit", async ev=>{
    ev.preventDefault();
    note.className="note";
    const name=$("gb-name").value.trim(), message=$("gb-msg").value.trim(), website=$("gb-website").value;
    if(!name||!message){ note.textContent="Add a name and a message."; note.className="note err"; return; }
    sendBtn.disabled=true; note.textContent="Sending…";
    try{
      const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,message,website})});
      const d=await r.json();
      if(d.ok){ form.reset(); note.textContent="Signed. 73!"; note.className="note ok"; load(); }
      else{ note.textContent=d.error||"Could not sign."; note.className="note err"; }
    }catch{ note.textContent="Network error. Try again."; note.className="note err"; }
    finally{ sendBtn.disabled=false; }
  });

  async function removeEntry(entry){
    if(!confirm("Delete this entry?\n\n\""+entry.message+"\"")) return;
    try{
      const r=await fetch(API+"/delete",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({id:entry.id, ts:entry.ts})});
      if(r.status===401){ doLogout(); alert("Admin session expired — please log in again."); return; }
      const d=await r.json();
      if(d.ok) load(); else alert(d.error||"Delete failed.");
    }catch{ alert("Delete failed — try again."); }
  }

  function syncAdmin(){ loginBox.hidden=adminMode; loggedBox.hidden=!adminMode; }

  $("admin-toggle").addEventListener("click", e=>{ e.preventDefault(); panel.hidden=!panel.hidden; syncAdmin(); });

  $("admin-login-btn").addEventListener("click", async ()=>{
    adminNote.className="note"; adminNote.textContent="Checking…";
    try{
      const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:passInput.value})});
      const d=await r.json();
      if(d.ok){ token=d.token; lsSet(KEY,token); adminMode=true; passInput.value=""; adminNote.textContent=""; syncAdmin(); panel.hidden=true; load(); }
      else{ adminNote.textContent="Wrong password."; adminNote.className="note err"; }
    }catch{ adminNote.textContent="Login failed."; adminNote.className="note err"; }
  });

  function doLogout(){ token=null; adminMode=false; lsDel(KEY); syncAdmin(); panel.hidden=true; load(); }
  $("admin-logout-btn").addEventListener("click", doLogout);

  syncAdmin();
  load();
</script>
</body>
</html>
