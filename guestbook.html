<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMRAN · Station Log</title>
<meta name="description" content="Sign the RAMRAN station logbook — leave your callsign and a 73.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --case:#0d1316; --case-deep:#090d0f; --panel:#141d21; --panel-line:#25343a;
    --field:#0f171a; --ink:#e9e6dc; --ink-dim:#7c8f94; --ink-faint:#4a5a5f;
    --amber:#ffb02e; --amber-soft:#c9821f;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; }
  body{
    background:radial-gradient(120% 90% at 50% 0%, #16211f 0%, var(--case) 45%, var(--case-deep) 100%);
    color:var(--ink); font-family:"JetBrains Mono", ui-monospace, monospace;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center;
    padding:24px 16px; min-height:100vh;
  }
  .card{
    width:100%; max-width:620px; align-self:flex-start;
    background:linear-gradient(180deg, #162025 0%, var(--panel) 60%);
    border:1px solid var(--panel-line); border-radius:14px;
    padding:clamp(24px, 5vw, 44px); position:relative; overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 30px 80px -40px #000;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  .card::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 4px);
    pointer-events:none;
  }
  .card > *{ position:relative; z-index:1; }

  .back{
    display:inline-flex; align-items:center; gap:7px;
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-dim); text-decoration:none; transition:color .18s;
  }
  .back:hover,.back:focus-visible{ color:var(--amber); outline:none; }
  .back:focus-visible{ outline:2px solid var(--amber); outline-offset:3px; }

  .status{
    display:inline-flex; align-items:center; gap:9px; margin-top:26px;
    font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--amber);
  }
  .beacon{ width:8px; height:8px; border-radius:50%; background:var(--amber); animation:ping 2.4s ease-out infinite; }
  .logtitle{
    font-family:"Saira Condensed", sans-serif; font-weight:700;
    font-size:clamp(40px, 12vw, 78px); line-height:.9; letter-spacing:.05em;
    margin:14px 0 0; text-shadow:0 0 26px rgba(255,176,46,.14);
  }
  .lede{ margin:16px 0 0; font-size:13px; line-height:1.6; color:var(--ink-dim); }
  .lede b{ color:var(--ink); font-weight:500; }

  /* ---- sign form ---- */
  form{ margin-top:30px; display:flex; flex-direction:column; gap:12px; }
  .row{ display:flex; gap:12px; }
  label{ display:block; font-size:9.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px; }
  input,textarea{
    width:100%; background:var(--field); color:var(--ink);
    border:1px solid var(--panel-line); border-radius:7px;
    font-family:inherit; font-size:14px; padding:11px 12px; resize:vertical;
    transition:border-color .18s, box-shadow .18s;
  }
  input:focus,textarea:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); }
  .field-name{ flex:1 1 40%; }
  .field-msg{ flex:1 1 60%; }
  textarea{ min-height:46px; }
  /* honeypot — hidden from humans, catches bots */
  .hp{ position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden; }

  .send{
    align-self:flex-start; margin-top:2px;
    background:transparent; color:var(--ink); cursor:pointer;
    border:1px solid var(--panel-line); border-radius:7px;
    font-family:inherit; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    padding:12px 22px; transition:border-color .18s, color .18s, box-shadow .18s;
  }
  .send:hover,.send:focus-visible{ border-color:var(--amber); color:var(--amber); box-shadow:0 0 22px -8px rgba(255,176,46,.6); outline:none; }
  .send:disabled{ opacity:.5; cursor:default; box-shadow:none; border-color:var(--panel-line); color:var(--ink-dim); }
  .note{ font-size:11px; letter-spacing:.04em; color:var(--ink-faint); min-height:14px; margin-top:2px; }
  .note.err{ color:#e8895f; }
  .note.ok{ color:var(--amber-soft); }

  /* ---- entries ---- */
  .entries{ margin-top:34px; border-top:1px solid var(--panel-line); }
  .entry{ padding:16px 2px; border-bottom:1px solid var(--panel-line); }
  .entry .head{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:6px; }
  .entry .who{ font-size:13px; font-weight:500; color:var(--amber); letter-spacing:.04em; }
  .entry .when{ font-size:10.5px; letter-spacing:.12em; color:var(--ink-faint); white-space:nowrap; }
  .entry .msg{ font-size:13.5px; line-height:1.55; color:var(--ink); white-space:pre-wrap; word-break:break-word; }
  .empty{ padding:26px 2px; color:var(--ink-dim); font-size:13px; }

  .foot{
    margin-top:34px; padding-top:18px; border-top:1px solid var(--panel-line);
    display:flex; justify-content:space-between; align-items:baseline; gap:12px;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint);
  }
  .foot .sign{ color:var(--amber-soft); }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @keyframes ping{ 0%{ box-shadow:0 0 0 0 rgba(255,176,46,.5); } 70%{ box-shadow:0 0 0 9px rgba(255,176,46,0); } 100%{ box-shadow:0 0 0 0 rgba(255,176,46,0); } }
  @media (prefers-reduced-motion: reduce){ .card{ animation:none; } .beacon{ animation:none; } }
  @media (max-width:480px){ .row{ flex-direction:column; } }
</style>
</head>
<body>
  <main class="card">

    <a class="back" href="index.html">&larr; RAMRAN</a>

    <div class="status"><span class="beacon"></span>Logbook open</div>
    <h1 class="logtitle">Station log</h1>
    <p class="lede">Passing through the mesh? <b>Sign the log.</b> Leave your callsign, node, or just a <b>73</b> — no account needed.</p>

    <form id="gb-form" autocomplete="off">
      <div class="row">
        <div class="field-name">
          <label for="gb-name">Callsign / name</label>
          <input id="gb-name" name="name" maxlength="40" required placeholder="e.g. WSLI610">
        </div>
      </div>
      <div class="field-msg">
        <label for="gb-msg">Message</label>
        <textarea id="gb-msg" name="message" maxlength="280" required placeholder="73 from the mesh..."></textarea>
      </div>
      <!-- honeypot: leave empty; bots fill it and get dropped -->
      <div class="hp" aria-hidden="true">
        <label>Website<input id="gb-website" name="website" tabindex="-1" autocomplete="off"></label>
      </div>
      <button class="send" id="gb-send" type="submit">Sign the log</button>
      <div class="note" id="gb-note"></div>
    </form>

    <section class="entries" id="gb-entries"></section>

    <footer class="foot">
      <span class="sign">73 &middot; de RAMRAN</span>
      <span>ramran.net</span>
    </footer>

  </main>

<script>
  // ===== Worker backend URL =====
  const API = "https://ramran-guestbook.rocareameshradioantennanetwork.workers.dev";
  // ==============================

  const form    = document.getElementById("gb-form");
  const note    = document.getElementById("gb-note");
  const sendBtn = document.getElementById("gb-send");
  const list    = document.getElementById("gb-entries");

  function fmt(ts){
    try { return new Date(ts).toISOString().slice(0,16).replace("T"," ") + " UTC"; }
    catch { return ""; }
  }

  function render(entries){
    list.textContent = "";
    if (!entries.length){
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = "No one's signed yet — be the first.";
      list.appendChild(e);
      return;
    }
    for (const it of entries){
      const wrap = document.createElement("div"); wrap.className = "entry";
      const head = document.createElement("div"); head.className = "head";
      const who  = document.createElement("span"); who.className = "who";  who.textContent = it.name;
      const when = document.createElement("span"); when.className = "when"; when.textContent = fmt(it.ts);
      head.append(who, when);
      const msg  = document.createElement("div"); msg.className = "msg"; msg.textContent = it.message; // textContent = XSS-safe
      wrap.append(head, msg);
      list.appendChild(wrap);
    }
  }

  async function load(){
    try {
      const r = await fetch(API, { method:"GET" });
      render(await r.json());
    } catch {
      list.innerHTML = '<div class="empty">Log unavailable right now. Try again shortly.</div>';
    }
  }

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    note.className = "note";
    const name    = document.getElementById("gb-name").value.trim();
    const message = document.getElementById("gb-msg").value.trim();
    const website = document.getElementById("gb-website").value;
    if (!name || !message){ note.textContent = "Add a name and a message."; note.className = "note err"; return; }

    sendBtn.disabled = true; note.textContent = "Sending…";
    try {
      const r = await fetch(API, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ name, message, website })
      });
      const data = await r.json();
      if (data.ok){
        form.reset();
        note.textContent = "Signed. 73!"; note.className = "note ok";
        load();
      } else {
        note.textContent = data.error || "Could not sign. Try again."; note.className = "note err";
      }
    } catch {
      note.textContent = "Network error. Try again."; note.className = "note err";
    } finally {
      sendBtn.disabled = false;
    }
  });

  load();
</script>
</body>
</html>
